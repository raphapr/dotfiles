# Preamble          -------------------------------------------- {{{

unbind C-b              ## unbind some default keybindings
unbind C-o              # clear rotate window ‘up’  hotkey
set -g prefix C-o       ## set prefix key to ctrl-o

# }}}
# Plugins           -------------------------------------------- {{{

set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  sainnhe/tmux-fzf                 \
  laktak/extrakto                  \
  wfxr/tmux-fzf-url                \
  tmux-plugins/tmux-online-status  \
  tmux-plugins/tmux-battery        \
  catppuccin/tmux#v2.3.0           \
  jaclu/tmux-power-zoom
'

set -g @extrakto_popup_size "50%"
set -g @extrakto_popup_position "C"
set -g @fzf-url-bind 'u'

# }}}
# Status Line       -------------------------------------------- {{{

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path\}\}\} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_red},bold]#{?pane_synchronized, SYNC │,}"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %d-%m-%Y 󰅐 %H:%M "

# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status bottom
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -g automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# }}}
# Environment       -------------------------------------------- {{{

# Prepend mise shims so all panes inherit managed tool versions
set-environment -g PATH "$HOME/.local/share/mise/shims:$PATH"

# }}}
# Global Settings   -------------------------------------------- {{{

set -g  default-terminal "tmux-256color"            # 256 color baseline
set -g  terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*256col*:RGB,*kitty*:clipboard:extkeys:sync,tmux-256color:sync" # idempotent Kitty/sync feature list
set -s set-clipboard on                             # copy through OSC 52, including SSH sessions
set -g default-shell "/usr/bin/fish"                # set fish as the shell started in tmux
set -g display-panes-time 3000                      # increase tmux pane numbers display time `ctrl-b q`
set -g history-limit 50000                          # set scrollback buffer size
set -g focus-events on                              # focus events enabled for terminals that support them
set -sg escape-time 5                               # kitty + csi-u keeps modifiers clean; small buffer for SSH
setw -g aggressive-resize on                        # set aggressive resize. super useful when using "grouped sessions" and multi-monitor setup.
setw -g mode-keys vi                                # navigate using vim-style keys
setw -g monitor-activity off                        # highlight windows with background activity
set  -g visual-activity off                         # status-bar highlight only; no popup message
# start first window and pane at 1, not zero
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Enable Yazi's image preview to work correctly in tmux
set -g allow-passthrough on
# Keep tmux's default forwarded session variables and add terminal identity.
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM"

# When destroy the last shell in a session, it switches to another active session
set -g detach-on-destroy off

set -g extended-keys on
set -g extended-keys-format csi-u

set -g set-titles on
set -g set-titles-string "#{session_name}"


# }}}
# Maps              -------------------------------------------- {{{

# switch tmux sessions
bind -r P switch-client -p
bind -r N switch-client -n
bind C-o run-shell "sesh last"

# sync panes
bind y set-window-option synchronize-panes on \;\
  display-message "Sync panes ON"
bind Y set-window-option synchronize-panes off \;\
  set-window-option pane-border-style default \;\
  display-message "Sync panes OFF"

# Send prefix to inner program (e.g. nested tmux)
# bind a send-prefix   # disabled: `prefix a` now opens the pimux dashboard
bind a display-popup -E -w 60% -h 60% pimux

# bind r to reloading the config file
bind r source-file ~/.tmux/tmux.conf \; refresh-client -S \; display "Reloaded tmux config file."

# better mnemonics for splitting panes!
bind \" split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind = split-window -v -c "#{pane_current_path}"

# new window opens in same working directory
bind c new-window -c "#{pane_current_path}"

# shift-movement keys will resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# vim / xmonad style bindings for pane movement
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# copy-paste vim mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# copy/paste using vim-style keys
unbind p
bind p paste-buffer

# kill Q q
unbind Q
bind Q confirm-before "kill-window"

# swap window
bind -n S-Left swap-window -t -1\; select-window -t -1
bind -n S-Right swap-window -t +1\; select-window -t +1

# Toggle between the last two windows
bind b last-window

# Send pane: <prefix> s, <prefix> j
bind C-p command-prompt -p "send pane to:"  "join-pane -t '%%'"

# Send window: <prefix> s, <prefix> j
bind C-w command-prompt -p "move window to:"  "move-window -t '%%'"

# move the pane in a clockwise direction
bind S swap-pane -D

# sesh session manager
bind-key "o" run-shell "REPO_ICON=\"\$(printf '\\356\\251\\242')\"; REPOS_ROOT=\"\${REPOS_ROOT:-\$HOME/repos}\"; sesh connect \"$(
  { sesh list -t -c --icons; ghq list -p | sed -e \"s|^\${REPOS_ROOT}/||\" -e \"s|^|\${REPO_ICON} |\"; } | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x/^f ghq ^d tmux kill' \
    --bind 'tab:down,btab:up' \
    --bind \"ctrl-a:change-prompt(⚡  )+reload(sesh list -t -c --icons; ghq list -p | sed -e 's|^\${REPOS_ROOT}/||' -e 's|^|\${REPO_ICON} |')\" \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind \"ctrl-x:change-prompt(🔎  )+reload(ghq list -p | sed -e 's|^\${REPOS_ROOT}/||' -e 's|^|\${REPO_ICON} |')\" \
    --bind \"ctrl-f:change-prompt(🔎  )+reload(ghq list -p | sed -e 's|^\${REPOS_ROOT}/||' -e 's|^|\${REPO_ICON} |')\" \
    --bind \"ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list -t -c --icons; ghq list -p | sed -e 's|^\${REPOS_ROOT}/||' -e 's|^|\${REPO_ICON} |')\" \
    --preview-window 'right:55%' \
    --preview \"sesh preview \\\"\\\$(echo {} | sed -e 's|^\${REPO_ICON} |\${REPOS_ROOT}/|' -e 's|^[^ ]* ||')\\\"\" \
  | sed -e \"s|^\${REPO_ICON} |\${REPOS_ROOT}/|\" -e \"s|^[^ ]* ||\"
)\""

bind 9 run-shell "sesh connect --root \"#{pane_current_path}\""

bind * confirm-before -p "Kill current session?" "kill-session"
bind & command-prompt -p "Rename active session to: " "rename-session '%%'"

# Dev layout: pi-agent left, nvim top-right, terminal bottom-right
bind W split-window -h -l 50% -c "#{pane_current_path}" nvim \; \
  split-window -v -l 30% -c "#{pane_current_path}" \; \
  send-keys -t 1 pi Enter \; \
  select-pane -t 1

# }}}
# Mouse Mode        -------------------------------------------- {{{

# Mouse mode is on by default
set -g mouse on
bind e set -g mouse on \; display "Mouse Mode ON"
bind E set -g mouse off \; display "Mouse Mode OFF"

# }}}
# Copy Mode         -------------------------------------------- {{{

# Do not copy selection and cancel copy mode on drag end event.
# Native tmux copy commands update the terminal clipboard through OSC 52.
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDown1Pane select-pane \;\
  if -F '#{selection_present}' \
    "send-keys -X copy-selection"

bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi y send-keys -X copy-selection

# Double click: Select & Copy (word)
bind -T copy-mode-vi DoubleClick1Pane \
    select-pane \; \
    send-keys -X select-word \; \
    send-keys -X copy-selection
bind -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    send-keys -X copy-selection

# Triple click: Select & Copy (line)
bind -T copy-mode-vi TripleClick1Pane \
    select-pane \; \
    send-keys -X select-line \; \
    send-keys -X copy-selection
bind -n TripleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-line \; \
    send-keys -X copy-selection

# }}}
# TPM initialization ------------------------------------------- {{{

run '~/.tmux/plugins/tpm/tpm'

# Keep prompts centered without replacing the full status line.
set -gF message-style "fg=#{@thm_teal},bg=default,align=centre,width=45%"
set -gF message-command-style "fg=#{@thm_teal},bg=default,align=centre,width=45%"
# Keep the action label and its input together inside the centered prompt area.
set -g message-format '#[#{?#{command_prompt},#{E:message-command-style},#{E:message-style}},align=left]#{message}'

# }}}
