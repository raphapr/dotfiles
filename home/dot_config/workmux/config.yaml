nerdfont: true
agent: pi
theme: night-sorbet

status_icons:
  working: "🤖" # Agent is processing
  waiting: "💬" # Agent needs input (auto-clears on focus)
  done: "✅" # Agent finished (auto-clears on focus)

panes:
  - command: "<agent>"
    focus: true

pre_remove:
  - /home/raphael/.bin/workmux-pre-remove

files:
  copy:
    - .env
